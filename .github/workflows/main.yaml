name: main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 23
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      # Install system dependencies to build a Tauri app on Linux
      # https://github.com/tauri-apps/tauri-action
      - name: Install packages
        run: |
          sudo apt update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run cotoami_node tests
        working-directory: cotoami_node
        run: cargo test --release --all-features

      - name: Run cotoami_desktop tests
        working-directory: cotoami_desktop/tauri
        run: cargo test --release --all-features

      - name: Install frontend dependencies
        working-directory: cotoami_desktop/ui
        run: yarn install --immutable

      - name: Run frontend Scala.js tests
        working-directory: cotoami_desktop/ui
        run: sbt test

      - name: Build frontend Scala.js app
        working-directory: cotoami_desktop/ui
        run: yarn build
